---
- name: Install Calico CNI
  hosts: control_plane[0]
  become: true
  any_errors_fatal: true
  tasks:
    - name: Download Calico CRDs manifest
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/v1_crd_projectcalico_org.yaml"
        dest: "/root/calico-{{ calico_version }}-crds.yaml"
        mode: "0600"
        timeout: 30
      register: calico_crds_download
      until: calico_crds_download is succeeded
      retries: 6
      delay: 20

    - name: Apply Calico CRDs using server-side apply
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - apply
          - --server-side
          - --force-conflicts
          - -f
          - "/root/calico-{{ calico_version }}-crds.yaml"
      register: calico_crds
      changed_when: "'serverside-applied' in calico_crds.stdout or 'created' in calico_crds.stdout"

    - name: Wait for Calico operator CRDs
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - wait
          - --for=condition=Established
          - crd/installations.operator.tigera.io
          - crd/apiservers.operator.tigera.io
          - --timeout=180s
      changed_when: false

    - name: Download Tigera operator manifest
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml"
        dest: "/root/calico-{{ calico_version }}-tigera-operator.yaml"
        mode: "0600"
        timeout: 30
      register: tigera_operator_download
      until: tigera_operator_download is succeeded
      retries: 6
      delay: 20

    - name: Apply Tigera operator using server-side apply
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - apply
          - --server-side
          - --force-conflicts
          - -f
          - "/root/calico-{{ calico_version }}-tigera-operator.yaml"
      register: tigera_operator
      changed_when: "'serverside-applied' in tigera_operator.stdout or 'created' in tigera_operator.stdout"

    - name: Wait for Tigera operator deployment
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - -n
          - tigera-operator
          - rollout
          - status
          - deployment/tigera-operator
          - --timeout=300s
      changed_when: false

    - name: Create Calico custom resources manifest
      ansible.builtin.copy:
        dest: /root/calico-custom-resources.yaml
        mode: "0600"
        content: |
          apiVersion: operator.tigera.io/v1
          kind: Installation
          metadata:
            name: default
          spec:
            calicoNetwork:
              ipPools:
                - blockSize: 26
                  cidr: {{ pod_cidr }}
                  encapsulation: VXLANCrossSubnet
                  natOutgoing: Enabled
                  nodeSelector: all()
          ---
          apiVersion: operator.tigera.io/v1
          kind: APIServer
          metadata:
            name: default
          spec: {}

    - name: Apply Calico custom resources using server-side apply
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - apply
          - --server-side
          - --force-conflicts
          - -f
          - /root/calico-custom-resources.yaml
      register: calico_custom_resources
      changed_when: "'serverside-applied' in calico_custom_resources.stdout or 'created' in calico_custom_resources.stdout"

    - name: Wait for all Kubernetes nodes to become ready
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - wait
          - --for=condition=Ready
          - nodes
          - --all
          - --timeout=600s
      changed_when: false

    - name: Restart CoreDNS after CNI installation
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - -n
          - kube-system
          - rollout
          - restart
          - deployment/coredns
      changed_when: true

    - name: Verify CoreDNS rollout
      block:
        - name: Wait for CoreDNS rollout
          ansible.builtin.command:
            argv:
              - kubectl
              - --kubeconfig
              - /etc/kubernetes/admin.conf
              - -n
              - kube-system
              - rollout
              - status
              - deployment/coredns
              - --timeout=300s
          changed_when: false

      rescue:
        - name: Collect kube-system pod status
          ansible.builtin.command:
            argv:
              - kubectl
              - --kubeconfig
              - /etc/kubernetes/admin.conf
              - -n
              - kube-system
              - get
              - pods
              - -o
              - wide
          register: kube_system_pods
          changed_when: false
          failed_when: false

        - name: Collect CoreDNS deployment details
          ansible.builtin.command:
            argv:
              - kubectl
              - --kubeconfig
              - /etc/kubernetes/admin.conf
              - -n
              - kube-system
              - describe
              - deployment/coredns
          register: coredns_details
          changed_when: false
          failed_when: false

        - name: Collect recent kube-system events
          ansible.builtin.command:
            argv:
              - kubectl
              - --kubeconfig
              - /etc/kubernetes/admin.conf
              - -n
              - kube-system
              - get
              - events
              - --sort-by=.lastTimestamp
          register: kube_system_events
          changed_when: false
          failed_when: false

        - name: Show kube-system pod status
          ansible.builtin.debug:
            var: kube_system_pods.stdout_lines

        - name: Show CoreDNS deployment details
          ansible.builtin.debug:
            var: coredns_details.stdout_lines

        - name: Show recent kube-system events
          ansible.builtin.debug:
            var: kube_system_events.stdout_lines

        - name: Stop because CoreDNS did not become ready
          ansible.builtin.fail:
            msg: CoreDNS wurde nach der CNI-Installation nicht bereit; Diagnose steht direkt oberhalb in diesem Joblog.
