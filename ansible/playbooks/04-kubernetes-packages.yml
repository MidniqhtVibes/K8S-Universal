---
- name: Install Kubernetes packages
  hosts: k8s_cluster
  become: true
  any_errors_fatal: true
  tasks:
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/Release.key"
        dest: /tmp/kubernetes-release.key
        mode: "0644"
        force: true
        timeout: 30
      register: kubernetes_apt_key_download
      until: kubernetes_apt_key_download is succeeded
      retries: 5
      delay: 10

    - name: Build Kubernetes apt keyring atomically
      ansible.builtin.shell: |
        set -euo pipefail
        release_key=/tmp/kubernetes-release.key
        tmp_keyring=/tmp/kubernetes-apt-keyring.gpg
        final_keyring=/etc/apt/keyrings/kubernetes-apt-keyring.gpg
        final_tmp="${final_keyring}.tmp"

        rm -f "${tmp_keyring}" "${final_tmp}"
        gpg --batch --dearmor -o "${tmp_keyring}" "${release_key}"
        gpg --batch --quiet --show-keys "${tmp_keyring}" >/dev/null

        if ! cmp -s "${tmp_keyring}" "${final_keyring}"; then
          install -m 0644 "${tmp_keyring}" "${final_tmp}"
          mv "${final_tmp}" "${final_keyring}"
          echo changed
        fi
      args:
        executable: /bin/bash
      register: kubernetes_apt_keyring
      changed_when: "'changed' in kubernetes_apt_keyring.stdout"

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/ /

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        lock_timeout: 600
        update_cache_retries: 5
        update_cache_retry_max_delay: 12

    - name: Install kubelet kubeadm kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        lock_timeout: 600

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet
      ansible.builtin.service:
        name: kubelet
        enabled: true
